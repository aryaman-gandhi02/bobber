databaseChangeLog:
  - changeSet:
      id: 001-create-table-event
      author: Aryaman Gandhi
      changes:
      - createTable:
          tableName: event
          columns:
            - column:
                name: id
                type: uuid
                constraints:
                  primaryKey: true
                  nullable: false

            - column:
                name: hook_id
                type: uuid
                constraints:
                  nullable: false

            - column:
                name: method
                type: varchar(10)
                constraints:
                  nullable: false

            - column:
                name: path
                type: text
                constraints:
                  nullable: false

            - column:
                name: content_type
                type: varchar(255)

            - column:
                name: query_params
                type: jsonb

            - column:
                name: headers
                type: jsonb

            - column:
                name: body
                type: bytea

            - column:
                name: received_at
                type: timestamptz
                constraints:
                  nullable: false

      - addForeignKeyConstraint:
          baseTableName: event
          baseColumnNames: hook_id
          referencedTableName: hook
          referencedColumnNames: id
          constraintName: fk_event_hook

      - createIndex:
          tableName: event
          indexName: idx_event_hook_id
          columns:
            - column:
                name: hook_id

      - createIndex:
          tableName: event
          indexName: idx_event_hook_id_received_at
          columns:
            - column:
                name: hook_id
            - column:
                name: received_at
                descending: true