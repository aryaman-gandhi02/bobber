databaseChangeLog:
  - changeSet:
      id: 001-create-table-hook
      author: Aryaman Gandhi
      changes:
        - createTable:
            tableName: hook
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false

              - column:
                  name: expires_at
                  type: timestamptz